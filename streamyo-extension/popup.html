<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 20px;
      margin: 0;
      background: #09090b;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .title {
      font-weight: 900;
      font-size: 18px;
      background: linear-gradient(to right, #00f2fe, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 10px 0;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #a1a1aa;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #00f2fe;
      border-radius: 50%;
      box-shadow: 0 0 10px #00f2fe;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1 class="title">STREAMYO ARMED</h1>
    <div class="status">
      <div class="dot"></div>
      Bypass Active
    </div>
  </div>
</body>
</html>
